<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Dolphin 3D Viewer</title>
<style>body{margin:0;overflow:hidden;background:#0a4a7a}canvas{display:block}
.info{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font:bold 24px sans-serif;text-shadow:0 2px 10px rgba(0,0,0,.5);z-index:10;text-align:center}
</style></head><body>
<div class="info">🐬 הדולפין שיצרתי ב-Blender — סובב עם העכבר!</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a4a7a);
scene.fog = new THREE.Fog(0x0a4a7a, 8, 25);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(4, 2, 5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.DirectionalLight(0xffffff, 2).translateX(5).translateY(8).translateZ(3));
scene.add(new THREE.AmbientLight(0x4488cc, 1));
scene.add(new THREE.DirectionalLight(0x88ccff, 1).translateX(-3).translateY(2).translateZ(-5));

// Water floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.MeshStandardMaterial({color:0x0d6ebd,roughness:0.8}));
floor.rotation.x=-Math.PI/2;floor.position.y=-2;scene.add(floor);

// Bubbles
for(let i=0;i<30;i++){
  const b=new THREE.Mesh(new THREE.SphereGeometry(0.03+Math.random()*0.08),new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.3}));
  b.position.set((Math.random()-.5)*10,Math.random()*6-1,(Math.random()-.5)*10);
  b.userData.speed=0.005+Math.random()*0.01;b.userData.startY=b.position.y;scene.add(b);
}

// Load dolphin
let dolphin=null;
new GLTFLoader().load('dolphin.glb', gltf=>{
  dolphin=gltf.scene;
  // Auto-fit: measure bounding box and scale/position
  const box=new THREE.Box3().setFromObject(dolphin);
  const size=box.getSize(new THREE.Vector3());
  const center=box.getCenter(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z);
  const scale=3/maxDim; // fit in ~3 units
  dolphin.scale.setScalar(scale);
  dolphin.position.sub(center.multiplyScalar(scale));
  scene.add(dolphin);
  // Move camera to see it
  camera.position.set(0,1.5,5);
  controls.target.set(0,0,0);
  controls.update();
  console.log('Dolphin loaded! size:',size,'scale:',scale);
}, undefined, err=>{console.error('GLB error:',err)});

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.05;controls.autoRotate=true;controls.autoRotateSpeed=2;

function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*0.001;
  if(dolphin){dolphin.position.y=Math.sin(t*1.5)*0.3;dolphin.rotation.z=Math.sin(t*1.2)*0.1}
  scene.children.forEach(c=>{if(c.userData.speed){c.position.y+=c.userData.speed;if(c.position.y>5)c.position.y=c.userData.startY}});
  controls.update();renderer.render(scene,camera);
}
animate();
window.onresize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)};
</script>
</body></html>
